name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MSSQL_USERNAME: sa
      MSSQL_PASSWORD: GE53cDfHPqWf

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Install java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: oracle
          cache: maven

      - name: start-mssql
        run: docker compose up -d --wait
          
      - name: package project
        run: mvn package
          
