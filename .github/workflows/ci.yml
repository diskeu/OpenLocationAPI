name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-spring-application:
    runs-on: ubuntu-latest
    env:
      MSSQL_USER: sa
      MSSQL_PASSWORD: GE53cDfHPqWf
      WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Install java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: oracle
          cache: maven

      - name: start-mssql
        run: docker compose up -d --wait

      - name: debug mssql
        if: always()
        run: |
          docker compose ps
          docker compose logs

      - name: add database
        run: docker exec sql_server_db sqlcmd -Q "CREATE DATABASE openLocationAPI"

      - name: package project
        run: mvn package
