spring:
  application:
    name: team-tasktracker

  server:
    port: 8080

  datasources:
    url: jdbc:sqlserver://localhost:1433;databaseName=${MSSQL_DB_NAME}
    username: ${MSSQL_USER}
    password: ${MSSQL_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.SQLServerDialect
